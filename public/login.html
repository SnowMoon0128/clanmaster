<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ClanMaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="nav">
      <div class="brand">ClanMaster</div>
      <nav>
        <a href="/">Home</a>
        <a href="/login" class="active">Login</a>
      </nav>
    </header>

    <main class="auth-page">
      <section class="auth-card">
        <h1>Login</h1>
        <p class="muted">Login first, then dashboard opens.</p>

        <form id="loginForm" class="form-stack">
          <input name="email" type="email" placeholder="Email (normal login)" />
          <input name="password" type="password" placeholder="Password" required />
          <input name="adminName" type="text" placeholder="Site admin name (JsonParc)" />
          <input name="adminId" type="text" placeholder="Site admin ID (00000000)" />
          <button type="submit">Sign In</button>
        </form>

        <details id="register" class="register-area">
          <summary>Create account</summary>

          <form id="ownerRegisterForm" class="form-grid two">
            <strong>Owner Register</strong>
            <input name="displayName" type="text" placeholder="Display name" required />
            <input name="email" type="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" required />
            <input name="clanName" type="text" placeholder="Clan name" required />
            <button type="submit">Create Owner</button>
          </form>

          <form id="managerRegisterForm" class="form-grid two">
            <strong>Manager Register</strong>
            <input name="displayName" type="text" placeholder="Display name" required />
            <input name="email" type="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" required />
            <button type="submit">Create Manager</button>
          </form>
        </details>
      </section>

      <section class="auth-log-card">
        <h2>Response Log</h2>
        <pre id="output"></pre>
      </section>
    </main>

    <script src="/auth.js"></script>
  </body>
</html>
