<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClanMaster Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-1"></div>
    <div class="bg-shape bg-2"></div>

    <header class="topbar">
      <h1>ClanMaster Control</h1>
      <div class="token-row">
        <label for="token">JWT</label>
        <input id="token" type="text" placeholder="로그인하면 자동 저장됩니다" />
        <button id="saveTokenBtn" type="button">토큰 저장</button>
        <button id="logoutBtn" type="button">로그아웃</button>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>로그인</h2>
        <form id="loginForm" class="form-grid">
          <input name="email" type="email" placeholder="이메일 (일반 로그인)" />
          <input name="password" type="password" placeholder="비밀번호" required />
          <input name="adminName" type="text" placeholder="사이트관리자 이름 (JsonParc)" />
          <input name="adminId" type="text" placeholder="사이트관리자 ID (00000000)" />
          <button type="submit">로그인</button>
        </form>
      </section>

      <section class="card">
        <h2>회원가입</h2>
        <form id="ownerRegisterForm" class="form-grid">
          <strong>클랜장 가입</strong>
          <input name="displayName" type="text" placeholder="표시 이름" required />
          <input name="email" type="email" placeholder="이메일" required />
          <input name="password" type="password" placeholder="비밀번호" required />
          <input name="clanName" type="text" placeholder="클랜명" required />
          <button type="submit">클랜장 가입</button>
        </form>
        <form id="managerRegisterForm" class="form-grid">
          <strong>클랜 관리자(매니저) 가입</strong>
          <input name="displayName" type="text" placeholder="표시 이름" required />
          <input name="email" type="email" placeholder="이메일" required />
          <input name="password" type="password" placeholder="비밀번호" required />
          <button type="submit">매니저 가입</button>
        </form>
      </section>

      <section class="card">
        <h2>클랜 운영(수동 입력)</h2>
        <form id="addPlayerForm" class="form-grid">
          <strong>플레이어 추가/갱신 + 현재 클랜 소속 지정</strong>
          <input name="clanId" type="number" placeholder="클랜 ID" required />
          <input name="gameUid" type="text" placeholder="게임 유저 ID" required />
          <input name="nickname" type="text" placeholder="닉네임" required />
          <button type="submit">저장</button>
        </form>

        <form id="movePlayerForm" class="form-grid">
          <strong>플레이어 클랜 이동</strong>
          <input name="playerId" type="number" placeholder="플레이어 PK ID" required />
          <input name="clanId" type="number" placeholder="이동할 클랜 ID" required />
          <button type="submit">이동</button>
        </form>

        <form id="historyForm" class="form-grid">
          <strong>플레이어 소속 이력 조회</strong>
          <input name="playerId" type="number" placeholder="플레이어 PK ID" required />
          <button type="submit">이력 조회</button>
        </form>

        <form id="blacklistForm" class="form-grid">
          <strong>블랙리스트 등록</strong>
          <input name="clanId" type="number" placeholder="클랜 ID" required />
          <input name="playerId" type="number" placeholder="플레이어 PK ID" required />
          <input name="reason" type="text" placeholder="사유 (선택)" />
          <button type="submit">등록</button>
        </form>
      </section>

      <section class="card">
        <h2>클랜 관리자 관리</h2>
        <form id="listAdminsForm" class="form-grid">
          <input name="clanId" type="number" placeholder="클랜 ID" required />
          <button type="submit">관리자 목록 조회</button>
        </form>

        <form id="addAdminForm" class="form-grid">
          <input name="clanId" type="number" placeholder="클랜 ID" required />
          <input name="email" type="email" placeholder="추가할 사용자 이메일" required />
          <button type="submit">관리자 추가</button>
        </form>
      </section>

      <section class="card">
        <h2>사이트 관리자 도구</h2>
        <form id="overviewForm" class="form-grid">
          <button type="submit">전체 현황 조회</button>
        </form>
        <form id="blockUserForm" class="form-grid">
          <input name="userId" type="number" placeholder="차단할 app_users.id" required />
          <input name="reason" type="text" placeholder="차단 사유" />
          <button type="submit">유저 차단</button>
        </form>
        <form id="unblockUserForm" class="form-grid">
          <input name="userId" type="number" placeholder="해제할 app_users.id" required />
          <button type="submit">차단 해제</button>
        </form>
      </section>

      <section class="card full">
        <h2>응답 로그</h2>
        <pre id="output"></pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
