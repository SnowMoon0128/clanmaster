<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - ClanMaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="nav nav-dashboard">
      <div class="brand">ClanMaster Dashboard</div>
      <nav id="dashMenu" class="dash-menu">
        <button type="button" data-target="section-clan" class="menu-btn active">클랜 관리</button>
        <button type="button" data-target="section-invite" id="ownerInviteMenu" class="menu-btn hidden">부관리자 초대</button>
        <button type="button" data-target="section-blacklist" class="menu-btn">블랙리스트 목록</button>
        <button type="button" data-target="section-site-admin" id="siteAdminMenu" class="menu-btn hidden">사이트 관리자</button>
      </nav>
      <div class="token-row">
        <span id="sessionBadge" class="session-badge">Session Active</span>
        <button id="logoutBtn" class="btn-danger" type="button">Logout</button>
      </div>
    </header>

    <main class="dash-layout">
      <section id="section-clan" class="card section-panel">
        <h2>Clan Operation</h2>
        <form id="addPlayerForm" class="form-grid two">
          <strong>Add or update player</strong>
          <input name="gameUid" type="text" placeholder="Game user ID" required />
          <input name="nickname" type="text" placeholder="Nickname" required />
          <button type="submit">Save</button>
        </form>

        <form id="movePlayerForm" class="form-grid two">
          <strong>Move player</strong>
          <input name="playerId" type="number" placeholder="Player PK ID" required />
          <button type="submit">Move</button>
        </form>

        <form id="historyForm" class="form-grid two">
          <strong>Player history</strong>
          <input name="playerId" type="number" placeholder="Player PK ID" required />
          <button type="submit">History</button>
        </form>

        <form id="blacklistForm" class="form-grid two">
          <strong>Blacklist</strong>
          <input name="playerId" type="number" placeholder="Player PK ID" required />
          <input name="reason" type="text" placeholder="Reason" />
          <button type="submit">Add</button>
        </form>
      </section>

      <section id="section-invite" class="card section-panel hidden">
        <h2>부관리자 초대 (클랜장 전용)</h2>
        <p id="ownerInviteCode" class="muted small"></p>
        <form id="listAdminsForm" class="form-grid two">
          <button type="submit">List admins</button>
        </form>

        <form id="addAdminForm" class="form-grid two">
          <input name="email" type="email" placeholder="User email" required />
          <button type="submit">Add admin</button>
        </form>

        <form id="removeAdminForm" class="form-grid two">
          <input name="userId" type="number" placeholder="Remove sub-admin user id" required />
          <button type="submit">Remove admin</button>
        </form>
      </section>

      <section id="section-blacklist" class="card section-panel hidden">
        <h2>Blacklist List</h2>
        <form id="blacklistListForm" class="form-grid two">
          <button type="submit">Load blacklist</button>
        </form>
        <form id="unblacklistForm" class="form-grid two">
          <input name="entryId" type="number" placeholder="Blacklist Entry ID" required />
          <button type="submit">Remove from blacklist</button>
        </form>
      </section>

      <section id="section-site-admin" class="card section-panel hidden">
        <h2>Site Admin Tools</h2>
        <form id="pendingOwnersForm" class="form-grid two">
          <button type="submit">List pending owners</button>
        </form>
        <form id="approveOwnerForm" class="form-grid two">
          <input name="requestId" type="number" placeholder="Approve request id" required />
          <button type="submit">Approve owner</button>
        </form>
        <form id="rejectOwnerForm" class="form-grid two">
          <input name="requestId" type="number" placeholder="Reject request id" required />
          <input name="reason" type="text" placeholder="Reject reason" />
          <button type="submit">Reject owner</button>
        </form>
        <form id="overviewForm" class="form-grid two">
          <button type="submit">System overview</button>
        </form>

        <form id="blockUserForm" class="form-grid two">
          <input name="userId" type="number" placeholder="Block app_users.id" required />
          <input name="reason" type="text" placeholder="Reason" />
          <button type="submit">Block user</button>
        </form>

        <form id="unblockUserForm" class="form-grid two">
          <input name="userId" type="number" placeholder="Unblock app_users.id" required />
          <button type="submit">Unblock user</button>
        </form>
      </section>

      <section class="card full hidden">
        <h2>Response Log</h2>
        <pre id="output"></pre>
      </section>
    </main>

    <script src="/dashboard.js"></script>
  </body>
</html>
